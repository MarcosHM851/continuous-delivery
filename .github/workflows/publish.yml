name: Publish in DockerHub

on:
  push:
    paths:
      - 'src/**'
      - 'pom.xml'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Run tests
        run: mvn -B test

      - name: Get project version
        id: project
        run: echo "tag=$(mvn -q help:evaluate -Dexpression=project.version -DforceStdout)" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/posts:${{ steps.project.outputs.tag }}
          echo "Building $IMAGE_NAME"
          mvn -B spring-boot:build-image \
            -DskipTests \
            -Dspring-boot.build-image.imageName=$IMAGE_NAME

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push image
        run: |
          IMAGE_NAME=${{ secrets.DOCKERHUB_USERNAME }}/posts:${{ steps.project.outputs.tag }}
          docker push $IMAGE_NAME